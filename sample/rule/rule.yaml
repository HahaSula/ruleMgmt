apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sample-rule
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: sample-group
      labels:
        app: test
      rules:
        - alert: HighCPUUsage
          expr: cpu_usage_percent > 80
          for: 5m
          labels:
            severity: warning
            product: mariadb
          annotations:
            summary: CPU usage is too high
            description: CPU usage exceeded 80% for 5 minutes
