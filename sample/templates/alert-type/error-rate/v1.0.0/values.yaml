name: error-rate
expr: 'rate({{ .metric }}{status=~"5.."}[{{ .window }}]) / rate({{ .metric }}[{{ .window }}]) > {{ .threshold }}'
vars:
  - name: metric
    type: metric
    description: HTTP requests counter metric name
  - name: window
    type: string
    description: rate window e.g. 5m
  - name: threshold
    type: number
    description: error ratio threshold (0–1), e.g. 0.05 for 5%
