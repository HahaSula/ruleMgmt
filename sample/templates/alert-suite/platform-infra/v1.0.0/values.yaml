alertSuite:
  name: platform-infra
  groupLabels:
    team: platform
  packInstances:
    - packName: threshold-pair
      packVersion: v1.0.0
      alertNamePrefix: cpu-usage
      vars:
        metric: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
        warnThreshold: '80'
        critThreshold: '95'
    - packName: threshold-pair
      packVersion: v1.0.0
      alertNamePrefix: memory-usage
      vars:
        metric: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
        warnThreshold: '85'
        critThreshold: '95'
  manualRules: []
  rules:
    - alertTypeName: direct-expr
      ruleName: cpu-usage-warning
      expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
      vars: {}
      severity: warning
      for: 5m
      description: cpu-usage exceeded warning level (> 80)
    - alertTypeName: direct-expr
      ruleName: cpu-usage-critical
      expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
      vars: {}
      severity: critical
      for: 2m
      description: cpu-usage exceeded critical level (> 95)
    - alertTypeName: direct-expr
      ruleName: memory-usage-warning
      expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
      vars: {}
      severity: warning
      for: 5m
      description: memory-usage exceeded warning level (> 85)
    - alertTypeName: direct-expr
      ruleName: memory-usage-critical
      expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 95
      vars: {}
      severity: critical
      for: 2m
      description: memory-usage exceeded critical level (> 95)
