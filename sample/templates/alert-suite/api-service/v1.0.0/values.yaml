alertSuite:
  name: api-service
  groupLabels:
    team: api
  rules:
    - alertTypeName: error-rate
      alertTypeVersion: v1.0.0
      ruleName: high-error-rate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
      vars:
        metric: http_requests_total
        window: 5m
        threshold: '0.05'
      severity: critical
      for: 2m
      description: HTTP error rate above 5% on {{ $labels.service }}
      labels:
        team: api
    - alertTypeName: high-threshold
      alertTypeVersion: v1.0.0
      ruleName: slow-p95
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
      vars:
        metric: http_request_duration_seconds
        op: '>'
        threshold: '0.5'
      severity: warning
      for: 5m
      description: p95 response time above 500ms on {{ $labels.service }}
      labels:
        team: api
