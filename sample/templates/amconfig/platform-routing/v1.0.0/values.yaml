configName: platform-routing
defaultReceiver: slack-warnings
groups:
  - name: platform-infra
    version: v1.0.0
  - name: api-service
    version: v1.0.0
receivers:
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: YOUR_PAGERDUTY_ROUTING_KEY
        send_resolved: true
  - name: slack-warnings
    slack_configs:
      - api_url: https://hooks.slack.com/services/YOUR_WEBHOOK_URL
        channel: '#alerts-warning'
        send_resolved: true
routeMatchers: []
routeMode: original
routeRules:
  - receiver: pagerduty-critical
    matchers:
      - key: severity
        op: '='
        value: critical
  - receiver: slack-warnings
    matchers:
      - key: severity
        op: '='
        value: warning
