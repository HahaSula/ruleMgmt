name: threshold-pair
description: "Warning + critical threshold pair — generates two alert rules from a single metric and two threshold values"
vars:
  - name: metric
    type: string
    description: "PromQL expression for the metric to monitor"
  - name: warnThreshold
    type: int
    description: "Warning threshold value"
  - name: critThreshold
    type: int
    description: "Critical threshold value"
rules:
  - ruleName: "{{ .alertName }}-warning"
    expr: "{{ .metric }} > {{ .warnThreshold }}"
    labels:
      severity: warning
    for: 5m
    description: "{{ .alertName }} exceeded warning level (> {{ .warnThreshold }})"
  - ruleName: "{{ .alertName }}-critical"
    expr: "{{ .metric }} > {{ .critThreshold }}"
    labels:
      severity: critical
    for: 2m
    description: "{{ .alertName }} exceeded critical level (> {{ .critThreshold }})"
